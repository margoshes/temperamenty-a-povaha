<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperamenty a povaha</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background: linear-gradient(#f5efe6, #e8d9c5);
  color:#4b3b2a;
}

.header {
  height:300px;
  background:url("./header.png") center/cover;
}

h1 {
  text-align:center;
  color:#b8925f;
  margin-top:-40px;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

button {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#d4b27a;
  cursor:pointer;
}

.selected {
  background:#b8925f;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header"></div>

<h1>🧠 Hra na temperamenty</h1>

<div class="container">

<h2>Vyber své rysy:</h2>

<div id="traits" class="grid"></div>

<button onclick="vyhodnot()">✨ Ukázat výsledek</button>

<h2 id="result"></h2>

</div>

<script>

const traits = [
"přátelský","laskavý","sebevědomý","skromný","zodpovědný",
"optimistický","pesimistický","upřímný","ambiciózní","trpělivý",
"roztržitý","hodný","tichý","nervózní","ctižádostivý",
"kreativní","pohodový","vytrvalý","veselý","odhodlaný"
];

const temperamentMap = {
cholerik:["ambiciózní","odhodlaný","ctižádostivý","sebevědomý"],
sangvinik:["přátelský","veselý","optimistický","kreativní"],
flegmatik:["klidný","trpělivý","pohodový","tichý"],
melancholik:["citlivý","nervózní","pesimistický","upřímný"]
};

let selected = [];

const container = document.getElementById("traits");

traits.forEach(t=>{
  const btn = document.createElement("button");
  btn.innerText = t;

  btn.onclick = ()=>{
    btn.classList.toggle("selected");

    if(selected.includes(t)){
      selected = selected.filter(x=>x!==t);
    } else {
      selected.push(t);
    }
  }

  container.appendChild(btn);
});

function vyhodnot(){

  let score = {
    cholerik:0,
    sangvinik:0,
    flegmatik:0,
    melancholik:0
  };

  selected.forEach(tr=>{
    for(let typ in temperamentMap){
      if(temperamentMap[typ].includes(tr)){
        score[typ]++;
      }
    }
  });

  let vysledek = Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);

  document.getElementById("result").innerText =
    "Tvůj temperament: " + vysledek.toUpperCase();
}

</script>

</body>
</html>
